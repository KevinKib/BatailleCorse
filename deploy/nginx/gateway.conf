# ---- HTTP: ACME challenge + redirect everything to HTTPS ----
server {
  listen 80;
  server_name kevinkib.com www.kevinkib.com;

  # Let's Encrypt HTTP-01 challenge files are written here by the certbot
  # container (shared volume) and must stay reachable over plain HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---- HTTPS: the actual app ----
server {
  listen 443 ssl;
  http2 on;
  server_name kevinkib.com www.kevinkib.com;

  ssl_certificate     /etc/letsencrypt/live/kevinkib.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kevinkib.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Re-resolve upstream container IPs at runtime through Docker's embedded DNS
  # (always 127.0.0.11 on a compose network). A literal hostname in proxy_pass
  # is resolved once at startup and cached for the worker's lifetime, so when a
  # deploy recreates the frontend/backend container (new IP) but not the gateway,
  # nginx keeps proxying to the dead old IP and every request 502s. Using the
  # hostname through a variable forces nginx to honour this resolver's TTL
  # instead, so recreated containers are picked up without a gateway restart.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $frontend_upstream frontend:80;
  set $backend_upstream backend:8080;

  location / {
    proxy_pass http://$frontend_upstream$request_uri;
  }

  location /connect/ {
    proxy_pass http://$backend_upstream$request_uri;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    # $request_uri keeps the full path including the /api prefix, which the
    # backend's @RequestMapping("/api") controllers need (matches the Vite proxy).
    proxy_pass http://$backend_upstream$request_uri;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
