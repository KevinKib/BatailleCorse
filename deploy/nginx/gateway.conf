# ---- HTTP: ACME challenge + redirect everything to HTTPS ----
server {
  listen 80;
  server_name kevinkib.com www.kevinkib.com;

  # Let's Encrypt HTTP-01 challenge files are written here by the certbot
  # container (shared volume) and must stay reachable over plain HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---- HTTPS: the actual app ----
server {
  listen 443 ssl;
  http2 on;
  server_name kevinkib.com www.kevinkib.com;

  ssl_certificate     /etc/letsencrypt/live/kevinkib.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kevinkib.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  location / {
    proxy_pass http://frontend:80;
  }

  location /connect/ {
    proxy_pass http://backend:8080;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    # No trailing slash: keep the /api prefix so it reaches the backend's
    # @RequestMapping("/api") controllers (matches the Vite dev proxy).
    proxy_pass http://backend:8080;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
