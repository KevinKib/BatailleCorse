version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      target: build
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      secrets:
        - maven_settings
    ports:
      - "8080:8080"

secrets:
  maven_settings:
    file: ./docker/settings.xml