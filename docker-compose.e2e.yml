version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      target: dev
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ./backend:/app
      - backend_m2:/root/.m2/repository
      - ./deploy/docker/settings.xml:/root/.m2/settings.xml:ro
    environment:
      - SPRING_PROFILES_ACTIVE=test

volumes:
  backend_m2:
