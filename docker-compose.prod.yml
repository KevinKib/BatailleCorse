version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      target: prod
    image: bataillecorse-frontend:0.1
    ports:
      - "80:80"

  backend:
    build:
      context: ./backend
      secrets:
        - maven_settings
    image: bataillecorse-backend:0.1
    ports:
      - "8080:8080"

  gateway:
    build:
      context: ./deploy/nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

secrets:
  maven_settings:
    file: deploy/docker/settings.xml